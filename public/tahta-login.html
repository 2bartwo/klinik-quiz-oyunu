<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahta Girişi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Tahta Paneli</h1>
      <p class="subtitle">Devam etmek için giriş yapın</p>
      <form id="login-form" class="auth-form">
        <input type="text" id="username" placeholder="Kullanıcı adı" autocomplete="username">
        <input type="password" id="password" placeholder="Şifre" autocomplete="current-password">
        <p id="login-error" class="login-error"></p>
        <button type="submit" class="btn btn-primary">Giriş Yap</button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      const res = await fetch('/api/tahta-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/tahta';
      } else {
        errEl.textContent = data.message || 'Kullanıcı adı veya şifre hatalı.';
      }
    };
  </script>
</body>
</html>
