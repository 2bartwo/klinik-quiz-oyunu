<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Tahtası - Canlı Skor Grafiği</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="tahta-body">
  <div class="tahta">
    <header class="tahta-header">
      <h1>Klinik Eğitim Quiz - Canlı Skor Tahtası</h1>
      <div class="tahta-top-bar">
        <div class="participants-box">
          <span class="participants-count">Katılımcılar: <strong id="participant-count">0</strong></span>
          <ul id="participant-list" class="participant-list"></ul>
        </div>
        <button id="qr-btn" class="btn btn-small">📱 QR Kod Göster</button>
      </div>
      <div class="tahta-controls">
        <button id="start-btn" class="btn btn-start">▶ Oyunu Başlat</button>
        <button id="end-btn" class="btn btn-end">⏹ Oyunu Bitir</button>
        <button id="prev-btn" class="btn btn-small">← Önceki</button>
        <span id="tahta-question-num">Soru 1/17</span>
        <button id="next-btn" class="btn btn-small">Sonraki →</button>
        <button id="reset-btn" class="btn btn-danger">Yeniden Başlat</button>
      </div>
    </header>

    <div class="tahta-content">
      <div class="current-question-box">
        <h2 id="tahta-question-text"></h2>
      </div>

      <div class="charts-row">
        <div class="chart-container">
          <h3 style="margin-bottom:0.5rem;font-size:0.95rem;color:var(--text-muted)">Doğru Cevaplar</h3>
          <canvas id="score-chart"></canvas>
        </div>
        <div class="chart-container">
          <h3 style="margin-bottom:0.5rem;font-size:0.95rem;color:var(--text-muted)">Yanlış Cevaplar</h3>
          <canvas id="wrong-chart"></canvas>
        </div>
      </div>

      <div class="question-stats">
        <h3>Soru Bazlı İstatistik (Doğru / Yanlış)</h3>
        <table>
          <thead>
            <tr><th>Soru</th><th>Doğru</th><th>Yanlış</th></tr>
          </thead>
          <tbody id="stats-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="qr-modal" class="qr-modal">
    <div class="qr-modal-content">
      <button id="qr-close" class="qr-close">×</button>
      <p>Oyuncular bu QR kodu okutarak katılır</p>
      <img id="qr-img" src="" alt="QR Kod" width="280" height="280">
      <small id="game-url"></small>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/tahta.js"></script>
</body>
</html>
